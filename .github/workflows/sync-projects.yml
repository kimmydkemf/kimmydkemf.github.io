name: Sync GitHub Projects

on:
  workflow_dispatch:
    inputs:
      force:
        description: '전체 재생성 (README SHA 무시)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ]; then FLAGS="--force"; fi
          python3 scripts/sync_projects.py $FLAGS

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/projects.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "auto: sync projects $(date +'%Y-%m-%d')"
            git push
          fi
